<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - Murree Heights</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #f9f9f9, #eaeaea);
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .thank-you-container {
      text-align: center;
      background-color: white;
      padding: 50px 40px;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      max-width: 500px;
    }

    .thank-you-container h1 {
      color: #2c3e50;
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .thank-you-container p {
      font-size: 1.1rem;
      color: #555;
      margin-top: 10px;
      line-height: 1.6;
    }

    .thank-you-container a {
      display: inline-block;
      margin-top: 25px;
      padding: 12px 25px;
      background-color: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background-color 0.3s ease;
    }

    .thank-you-container a:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="thank-you-container">
    <h1>Thank You!</h1>
    <p>Your message has been received by <strong>Murree Heights</strong>.</p>
    <p>We appreciate your interest and will get back to you shortly with a response tailored to your needs.</p>
    <p>In the meantime, feel free to explore our hotel rooms, rental listings, or properties for sale.</p>
    <a href="index.html">Return to Homepage</a>
  </div>
</body>
</html>
